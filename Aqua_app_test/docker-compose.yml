services:
  mysql_db:
    image: mysql:latest

    container_name: mysql_db

    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: mysql_db
      MYSQL_USER: user
      MYSQL_PASSWORD: user1234

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: